# 배포 URL: `<USER>.github.io` 특수 저장소면 루트(/)에 배포(https://muklog.github.io/).
# 그 외 이름이면 https://<user>.github.io/<repo>/ 경로에 배포됩니다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 배포 중인 실행을 취소하지 않음 (공식 Pages 템플릿과 동일)
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # GitHub Pages 의 base path 자동 계산
      # - 사용자/조직 페이지(<user>.github.io 저장소)면 "/"
      # - 그 외엔 "/저장소이름/"
      - name: Compute base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      # GitHub 저장소 Settings → Secrets and variables → Actions → Repository secrets
      # 이름만 만들고 값을 안 넣으면 빌드는 되지만 앱에서 Firebase 가 꺼진 것처럼 동작합니다.
      # 값 확인: Actions 실행 로그에서 아래 단계의 경고를 보면 됩니다(값 자체는 절대 출력 안 함).
      - name: Firebase Secrets 채워졌는지 확인
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        run: |
          missing=0
          need() {
            name="$1"
            val="$2"
            if [ -z "${val:-}" ]; then
              echo "::warning::$name — 비어 있습니다. Settings → Secrets → Actions 에서 해당 이름을 연필(업데이트)으로 열고 Firebase 값을 붙여넣어 저장하세요."
              missing=1
            fi
          }
          need "VITE_FIREBASE_API_KEY" "$VITE_FIREBASE_API_KEY"
          need "VITE_FIREBASE_AUTH_DOMAIN" "$VITE_FIREBASE_AUTH_DOMAIN"
          need "VITE_FIREBASE_PROJECT_ID" "$VITE_FIREBASE_PROJECT_ID"
          need "VITE_FIREBASE_APP_ID" "$VITE_FIREBASE_APP_ID"
          if [ -z "${VITE_FIREBASE_MESSAGING_SENDER_ID:-}" ]; then
            echo "::notice::VITE_FIREBASE_MESSAGING_SENDER_ID 가 비어 있음 — 가능하면 Firebase 웹 앱 구성의 messagingSenderId 를 넣는 것을 권장합니다."
          fi
          if [ -z "${VITE_FIREBASE_STORAGE_BUCKET:-}" ]; then
            echo "::notice::VITE_FIREBASE_STORAGE_BUCKET 비어 있음 — 기본으로 PROJECT_ID.firebasestorage.app 을 씁니다. 구 버킷(…appspot.com)만 있는 프로젝트는 Secret 에 버킷 문자열을 명시하고, Firebase 콘솔에서 Storage를 켠 뒤 npm run deploy:storage-rules 로 storage.rules 배포까지 해 주세요."
          fi
          if [ "$missing" -ne 0 ]; then
            echo "::notice::Firebase Console → 프로젝트 설정(톱니) → 일반 → 내 앱 → 웹 앱 → Firebase SDK 스니펫의 firebaseConfig 객체와 이름을 매칭해 입력합니다."
          fi

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.base }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Verify Digital Asset Links in dist
        run: test -f dist/.well-known/assetlinks.json && ls -la dist/.well-known/

      # 새로고침 시 404 방지 - SPA fallback
      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      # configure-pages 는 저장소에 Pages(API)가 아직 없으면 404로 실패한다.
      # Vite 빌드는 아래 outputs가 필요 없으므로 이 단계는 생략한다.
      # v4 는 tar 시 --exclude=".[^/]*" 로 .well-known 전체가 빠져 assetlinks.json 이 404 가 됨
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
